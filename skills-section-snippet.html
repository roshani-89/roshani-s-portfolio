<section id="skills">
  <div class="reveal" style="margin-bottom:3.5rem;">
    <span class="section-label">Toolkit</span>
    <h2 class="section-h">Skills &amp; <em>expertise</em></h2>
  </div>

  <!-- SUMMARY STATS -->
  <div class="skills-summary reveal">
    <div class="sk-sum"><span class="n">20</span><span class="l">Technologies</span></div>
    <div class="sk-sum"><span class="n">4</span><span class="l">Domains</span></div>
    <div class="sk-sum"><span class="n">2+</span><span class="l">Years Exp.</span></div>
    <div class="sk-sum"><span class="n">95%</span><span class="l">Top Skill</span></div>
  </div>

  <!-- FILTER PILLS -->
  <div class="skills-filter reveal" style="transition-delay:0.1s">
    <div class="f-pill active" data-cat="all"><span class="fdot" style="background:#888"></span> All Skills</div>
    <div class="f-pill" data-cat="frontend"><span class="fdot" style="background:#5DCAA5"></span> Frontend</div>
    <div class="f-pill" data-cat="backend"><span class="fdot" style="background:#7F77DD"></span> Backend</div>
    <div class="f-pill" data-cat="design"><span class="fdot" style="background:#D85A30"></span> Design & CMS</div>
    <div class="f-pill" data-cat="devops"><span class="fdot" style="background:#BA7517"></span> DevOps</div>
  </div>

  <!-- SKILL CARDS -->
  <div class="skills-grid reveal" id="skills-grid" style="transition-delay:0.15s"></div>
</section>

<!-- Skills JS — add before closing </script> or in a new <script> block -->
<script>
(function(){
  const SKILLS = [
    { name:"JavaScript",    pct:95, cat:"frontend", color:"#5DCAA5" },
    { name:"React.js",      pct:92, cat:"frontend", color:"#5DCAA5" },
    { name:"CSS / Tailwind",pct:94, cat:"frontend", color:"#5DCAA5" },
    { name:"TypeScript",    pct:80, cat:"frontend", color:"#5DCAA5" },
    { name:"Next.js",       pct:75, cat:"frontend", color:"#5DCAA5" },
    { name:"HTML5",         pct:98, cat:"frontend", color:"#5DCAA5" },
    { name:"Node.js",       pct:88, cat:"backend",  color:"#7F77DD" },
    { name:"REST APIs",     pct:92, cat:"backend",  color:"#7F77DD" },
    { name:"PostgreSQL",    pct:82, cat:"backend",  color:"#7F77DD" },
    { name:"MongoDB",       pct:78, cat:"backend",  color:"#7F77DD" },
    { name:"GraphQL",       pct:70, cat:"backend",  color:"#7F77DD" },
    { name:"Python",        pct:65, cat:"backend",  color:"#7F77DD" },
    { name:"Figma",         pct:88, cat:"design",   color:"#D85A30" },
    { name:"WordPress",     pct:90, cat:"design",   color:"#D85A30" },
    { name:"Webflow",       pct:82, cat:"design",   color:"#D85A30" },
    { name:"SEO",           pct:80, cat:"design",   color:"#D85A30" },
    { name:"Git & GitHub",  pct:92, cat:"devops",   color:"#BA7517" },
    { name:"Vercel/Netlify",pct:85, cat:"devops",   color:"#BA7517" },
    { name:"Docker",        pct:68, cat:"devops",   color:"#BA7517" },
    { name:"AWS",           pct:65, cat:"devops",   color:"#BA7517" },
  ];
  const CAT_LABELS = { frontend:"Frontend", backend:"Backend", design:"Design & CMS", devops:"DevOps" };
  const grid = document.getElementById('skills-grid');

  SKILLS.forEach(s => {
    const d = document.createElement('div');
    d.className = 'sk-node'; d.dataset.cat = s.cat;
    d.innerHTML = `<div class="accent" style="background:${s.color}"></div>
      <div class="sk-top"><span class="sk-name">${s.name}</span><span class="sk-pct">${s.pct}%</span></div>
      <div class="sk-track"><div class="sk-fill" style="background:${s.color};width:${s.pct}%"></div></div>
      <span class="sk-cat-tag">${CAT_LABELS[s.cat]}</span>`;
    grid.appendChild(d);
  });

  const skillObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) setTimeout(()=>{ e.target.querySelectorAll('.sk-fill').forEach(f=>f.style.transform='scaleX(1)'); },80); });
  },{threshold:0.1});
  skillObs.observe(grid);

  document.querySelectorAll('.f-pill').forEach(pill=>{
    pill.addEventListener('click',()=>{
      document.querySelectorAll('.f-pill').forEach(p=>p.classList.remove('active'));
      pill.classList.add('active');
      const cat = pill.dataset.cat;
      document.querySelectorAll('.sk-node').forEach(n=>{
        n.classList.toggle('hidden', cat!=='all' && n.dataset.cat!==cat);
        n.querySelectorAll('.sk-fill').forEach(f=>f.style.transform='scaleX(0)');
      });
      setTimeout(()=>{
        document.querySelectorAll('.sk-node:not(.hidden) .sk-fill').forEach(f=>f.style.transform='scaleX(1)');
      },40);
    });
  });
})();
</script>
