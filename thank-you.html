<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Roshani Bhaskar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #120a07;
      --surface: #1a110e;
      --surface2: #241814;
      --gold: #d4b996;
      --gold-light: #e8d8c3;
      --gold-dim: rgba(212, 185, 150, 0.15);
      --white: #f9f5f2;
      --muted: rgba(249, 245, 242, 0.4);
      --border: rgba(212, 185, 150, 0.12);
      --border-bright: rgba(212, 185, 150, 0.35);
      --radius: 20px;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    /* NOISE TEXTURE */
    .noise-bg {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
      opacity: 0.6;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .thank-you-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 4rem 2rem;
      max-width: 600px;
      width: 100%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .thank-you-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .success-icon {
      font-size: 4.5rem;
      color: var(--gold);
      margin-bottom: 2rem;
      display: inline-block;
      animation: scaleCheck 0.6s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      margin-bottom: 1rem;
      color: var(--white);
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 2.2rem;
      border-radius: 100px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .btn-primary {
      background: var(--gold);
      color: #120a07;
    }

    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 185, 150, 0.3);
    }

    .btn-ghost {
      border: 1px solid var(--border-bright);
      color: var(--gold-light);
    }

    .btn-ghost:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleCheck {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transition: transform 0.08s;
      mix-blend-mode: screen;
    }

    #cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(212, 185, 150, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
    }
  </style>
</head>

<body>
  <div class="noise-bg"></div>
  <div class="glow"></div>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <div class="thank-you-card">
    <div class="success-icon">✓</div>
    <h1>Message <em>Sent!</em></h1>
    <p>Thank you for reaching out. Your message has been successfully delivered to my email. I'll get back to you as soon as possible!</p>
    
    <div class="btn-group">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="https://wa.me/918983150718" class="btn btn-ghost">Chat on WhatsApp</a>
    </div>
  </div>

  <script>
    /* CURSOR */
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.transform = `translate(${mx - 4}px,${my - 4}px)`;
    });
    function animateRing() {
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      ring.style.transform = `translate(${rx - 18}px,${ry - 18}px)`;
      requestAnimationFrame(animateRing);
    }
    animateRing();
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => { ring.style.transform += ` scale(1.5)`; ring.style.borderColor = 'rgba(212, 185, 150, 0.7)'; });
      el.addEventListener('mouseleave', () => { ring.style.borderColor = 'rgba(212, 185, 150, 0.4)'; });
    });
  </script>
</body>

</html>
